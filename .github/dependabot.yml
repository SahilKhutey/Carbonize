version: 2
updates:
  # Check for npm/pnpm updates weekly
  - package-ecosystem: "npm"
    directory: "/packages/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Check for Poetry dependency updates weekly
  - package-ecosystem: "pip" # Note: dependabot uses 'pip' for poetry projects and automatically detects pyproject.toml
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
