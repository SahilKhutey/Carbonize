# ============================================================================
# CI Build: runs on every PR and push to main
# ============================================================================
name: CI Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io

jobs:
  # ============================================================================
  # 1. BACKEND CI (Python)
  # ============================================================================
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping"
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: poetry

      - name: Install Poetry
        run: pip install poetry

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install

      # ----- Lint & Type Check -----
      - name: Lint (ruff)
        run: poetry run ruff check packages/

      - name: Format check (black)
        run: poetry run black --check packages/

      - name: Type check (mypy)
        run: poetry run mypy packages/ --strict

      # ----- Tests -----
      - name: Unit tests
        run: |
          poetry run pytest packages/*/tests/unit \
            --cov=packages --cov-report=xml --cov-fail-under=80 \
            -m "not slow" -v

      - name: Integration tests
        run: |
          poetry run pytest packages/*/tests/integration -v

      - name: Architecture tests
        run: |
          poetry run pytest packages/*/tests/architecture -v

      # ----- Coverage -----
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          fail_ci_if_error: true

      # ----- Security -----
      - name: Security scan (bandit)
        run: poetry run bandit -r packages/ -ll

      - name: Detect secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline

  # ============================================================================
  # 2. FRONTEND CI (TypeScript / React)
  # ============================================================================
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: packages/web/pnpm-lock.yaml

      - name: Install dependencies
        run: cd packages/web && pnpm install --frozen-lockfile

      # ----- Lint & Type Check -----
      - name: Lint (ESLint)
        run: cd packages/web && pnpm run lint

      - name: Format check (Prettier)
        run: cd packages/web && pnpm run format:check

      - name: Type check (TypeScript)
        run: cd packages/web && pnpm run type-check

      # ----- Tests -----
      - name: Unit tests
        run: cd packages/web && pnpm test --run --coverage

      # ----- Build -----
      - name: Build
        run: cd packages/web && pnpm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: packages/web/coverage
          flags: frontend
          fail_ci_if_error: true

  # ============================================================================
  # 3. DOCKER BUILD (Build images on PR)
  # ============================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: deploy/docker/api.Dockerfile
          - service: worker
            dockerfile: deploy/docker/worker.Dockerfile
          - service: web
            dockerfile: deploy/docker/web.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cbms-${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
            ghcr.io/${{ github.repository_owner }}/cbms-${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Scan with Trivy
        uses: aquasec/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cbms-${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}-pr-${{ github.event.pull_request.number }}.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.service }}-pr-${{ github.event.pull_request.number }}.sarif'

  # ============================================================================
  # 4. CONTRACT TESTS (Cross-component)
  # ============================================================================
  contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 10

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: --health-cmd pg_isready --health-interval 10s
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        options: --health-cmd "redis-cli ping"
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - run: pip install poetry && poetry install

      - name: WebSocket contract
        run: poetry run pytest tests/contract/test_ws_protocol.py -v

      - name: Multi-tenant isolation
        run: poetry run pytest tests/security/test_tenant_isolation.py -v

      - name: Property-based tests
        run: poetry run pytest tests/property/ -v --timeout=60
