# ============================================================================
# CBMS-Sim Local Development Stack
# ============================================================================
# Usage: docker compose up
# ============================================================================

name: cbms-stack

services:

  # ============================================================================
  # DATABASE (PostgreSQL + TimescaleDB)
  # ============================================================================
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cbms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cbms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cbms_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cbms}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cbms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ============================================================================
  # REDIS (broker + cache)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: cbms-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ============================================================================
  # S3-COMPATIBLE OBJECT STORAGE (MinIO)
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: cbms-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ============================================================================
  # API (FastAPI)
  # ============================================================================
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    container_name: cbms-api
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cbms}:${POSTGRES_PASSWORD:-cbms_dev_password}@postgres:5432/${POSTGRES_DB:-cbms}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      S3_BUCKET: ${S3_BUCKET:-cbms-reports}
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend
      - frontend

  # ============================================================================
  # WORKER (Celery)
  # ============================================================================
  worker:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    container_name: cbms-worker
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cbms}:${POSTGRES_PASSWORD:-cbms_dev_password}@postgres:5432/${POSTGRES_DB:-cbms}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      S3_BUCKET: ${S3_BUCKET:-cbms-reports}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD", "celery", "-A", "cbms_workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend

  # ============================================================================
  # BEAT (Celery scheduler for periodic tasks)
  # ============================================================================
  beat:
    build:
      context: ..
      dockerfile: deploy/docker/worker.Dockerfile
    container_name: cbms-beat
    command: celery -A cbms_workers.celery_app beat --loglevel=info
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cbms}:${POSTGRES_PASSWORD:-cbms_dev_password}@postgres:5432/${POSTGRES_DB:-cbms}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  # ============================================================================
  # PROMETHEUS (Metrics)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: cbms-prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring
      - backend

  # ============================================================================
  # GRAFANA (Dashboards)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: cbms-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./packages/dashboards/provisioning:/etc/grafana/provisioning:ro
      - ./packages/dashboards/grafana:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  # ============================================================================
  # WEB (Production build with nginx)
  # ============================================================================
  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    container_name: cbms-web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - frontend
      - backend

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  monitoring:
    driver: bridge
